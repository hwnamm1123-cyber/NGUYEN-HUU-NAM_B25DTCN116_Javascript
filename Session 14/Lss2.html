<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> 
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list">
        </ul>

    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit">Thêm Sản Phẩm</button>
    </form>

    <script>
        const products = [
        { id: 1, name: "Bánh Chưng", price: 150000 },
        { id: 2, name: "Giò Lụa", price: 180000 },
        { id: 3, name: "Cành Đào", price: 500000 },
        { id: 4, name: "Mứt Tết", price: 120000 },
        { id: 5, name: "Bao Lì Xì", price: 25000 },
        { id: 6, name: "Dưa Hấu Tết", price: 80000 },
    ];

    const productList = document.getElementById('product-list');

    products.forEach(product => {
        const productDiv = document.createElement('div');
        productDiv.classList.add('product');

        productDiv.innerHTML = `
            <h3>${product.name}</h3>
            <p>Giá: ${product.price.toLocaleString()} VNĐ</p>
        `;

        productList.appendChild(productDiv);
    });

    const productForm = document.getElementById('product-form');

    productForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const nameValue = document.getElementById('product-name').value;
        const priceValue = document.getElementById('product-price').value;

        if (nameValue.trim() === "" || priceValue === "") {
            alert("Vui lòng nhập đầy đủ thông tin sản phẩm!");
            return;
        }

        const newProduct = {
            id: products.length + 1,
            name: nameValue,
            price: Number(priceValue)
        };

        const newLi = document.createElement('li');
        newLi.classList.add('product-item'); 

        newLi.innerHTML = `
            <h3>${newProduct.name}</h3>
            <p>Giá: ${newProduct.price.toLocaleString()} VNĐ</p>
        `;

        productList.appendChild(newLi);
        productForm.reset(); 
    });
    </script>
</body>
</html>
